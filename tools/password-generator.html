<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="../logo.png">
<link rel="stylesheet" href="../style.css">
<meta name="description" content="Generate strong and secure passwords instantly with this free online password generator.">
<meta name="keywords" content="password generator, strong password generator, random password tool">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="canonical" href="https://thezer0.tools/tools/password-generator.html">
<title>Password Generator Online — Thezer0 Tools</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #faf7f2; --surface: #ffffff; --border: #e8e0d0; --border-hover: #d4a96a;
    --text-primary: #1a1510; --text-secondary: #6b5f4e; --text-muted: #a89880;
    --accent: #c97c2a; --accent-light: #f5e6cc; --accent-glow: rgba(201,124,42,0.12);
    --shadow-sm: 0 1px 3px rgba(26,21,16,0.06); --radius: 12px;
    --transition: 0.22s cubic-bezier(0.4,0,0.2,1);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text-primary); min-height: 100vh; display: flex; flex-direction: column; -webkit-font-smoothing: antialiased; }
  body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(ellipse 80% 50% at 50% -10%, rgba(201,124,42,0.07) 0%, transparent 60%); pointer-events: none; z-index: 0; }

  nav { position: relative; z-index: 2; padding: 16px 32px; border-bottom: 1px solid var(--border); background: rgba(250,247,242,0.85); backdrop-filter: blur(8px); display: flex; align-items: center; gap: 8px; }
  nav a { font-size: 13px; color: var(--text-muted); text-decoration: none; font-family: 'DM Mono', monospace; transition: color var(--transition); }
  nav a:hover { color: var(--accent); }
  nav span { color: var(--border-hover); font-size: 12px; }
  nav .current { color: var(--text-secondary); font-weight: 500; }

  main { position: relative; z-index: 1; max-width: 560px; margin: 0 auto; padding: 48px 24px 64px; width: 100%; animation: fadeUp 0.4s ease both; }

  .tool-header { margin-bottom: 32px; }
  .tool-badge { display: inline-flex; align-items: center; background: var(--accent-light); color: var(--accent); font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; padding: 5px 12px; border-radius: 99px; border: 1px solid rgba(201,124,42,0.2); margin-bottom: 14px; }
  h1 { font-size: 28px; font-weight: 600; letter-spacing: -0.02em; margin-bottom: 6px; }
  .tool-desc { font-size: 15px; color: var(--text-secondary); font-weight: 300; }

  .card { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 28px; box-shadow: var(--shadow-sm); }

  label { display: block; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text-muted); margin-bottom: 8px; font-family: 'DM Mono', monospace; }

  .section { margin-bottom: 24px; }
  .divider { height: 1px; background: var(--border); margin: 24px 0; }

  /* Length control */
  .length-row { display: flex; align-items: center; gap: 14px; }
  input[type="range"] {
    -webkit-appearance: none; flex: 1; height: 4px;
    background: linear-gradient(to right, var(--accent) 0%, var(--accent) var(--pct, 50%), var(--border) var(--pct, 50%), var(--border) 100%);
    border-radius: 99px; outline: none; cursor: pointer;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%;
    background: var(--accent); border: 3px solid #fff;
    box-shadow: 0 1px 4px rgba(201,124,42,0.4); cursor: pointer;
    transition: transform var(--transition);
  }
  input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.15); }

  .length-val {
    min-width: 40px; text-align: center; font-family: 'DM Mono', monospace;
    font-size: 16px; font-weight: 500; color: var(--accent);
    background: var(--accent-light); padding: 4px 10px; border-radius: 6px;
  }

  /* Checkboxes */
  .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .checkbox-label {
    display: flex; align-items: center; gap: 10px; cursor: pointer;
    padding: 10px 14px; border-radius: 8px; border: 1.5px solid var(--border);
    background: var(--bg); font-size: 14px; color: var(--text-secondary);
    transition: all var(--transition); user-select: none;
  }
  .checkbox-label:hover { border-color: var(--border-hover); color: var(--text-primary); }
  .checkbox-label input { display: none; }
  .checkbox-label .box {
    width: 18px; height: 18px; border-radius: 5px; border: 2px solid var(--border);
    background: var(--surface); flex-shrink: 0; display: flex; align-items: center;
    justify-content: center; transition: all var(--transition); font-size: 11px;
  }
  .checkbox-label input:checked ~ .box { background: var(--accent); border-color: var(--accent); color: #fff; }
  .checkbox-label input:checked ~ .box::after { content: '✓'; }
  .checkbox-label:has(input:checked) { border-color: var(--border-hover); background: rgba(201,124,42,0.04); color: var(--text-primary); }

  /* Password output */
  .password-display {
    position: relative; background: var(--bg); border: 1.5px solid var(--border);
    border-radius: 8px; padding: 16px 48px 16px 16px; font-family: 'DM Mono', monospace;
    font-size: 15px; word-break: break-all; line-height: 1.6; color: var(--text-primary);
    min-height: 56px; transition: border-color var(--transition);
  }
  .password-display.has-value { border-color: var(--border-hover); }
  .password-display #passwordText { color: var(--text-primary); }
  .password-placeholder { color: var(--text-muted); font-style: italic; font-size: 13px; }

  /* Strength bar */
  .strength-row { display: flex; align-items: center; gap: 10px; margin-top: 12px; }
  .strength-bar { flex: 1; height: 4px; background: var(--border); border-radius: 99px; overflow: hidden; }
  .strength-fill { height: 100%; border-radius: 99px; transition: width 0.4s ease, background 0.4s ease; width: 0%; }
  .strength-label { font-size: 12px; font-family: 'DM Mono', monospace; color: var(--text-muted); min-width: 50px; text-align: right; }

  .actions { display: flex; gap: 10px; flex-wrap: wrap; }
  button { display: inline-flex; align-items: center; gap: 7px; padding: 10px 20px; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; border: 1.5px solid transparent; transition: all var(--transition); }
  .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); box-shadow: 0 2px 8px rgba(201,124,42,0.25); }
  .btn-primary:hover { background: #b56d21; border-color: #b56d21; transform: translateY(-1px); box-shadow: 0 4px 14px rgba(201,124,42,0.35); }
  .btn-primary:active { transform: translateY(0); }
  .btn-copy { background: var(--surface); color: var(--text-muted); border-color: var(--border); }
  .btn-copy:hover { border-color: var(--border-hover); color: var(--accent); }
  .btn-copy.copied { background: var(--accent-light); border-color: var(--accent); color: var(--accent); }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
  @media (max-width: 480px) { main { padding: 32px 16px 48px; } nav { padding: 14px 16px; } .options-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<nav>
  <a href="../index.html">Thezer0 Tools</a>
  <span>›</span>
  <span class="current">Password Generator</span>
</nav>

<main>
  <div class="tool-header">
    <div class="tool-badge">🔑</div>
    <h1>Password Generator</h1>
    <p class="tool-desc">Generate strong, random passwords with custom options.</p>
  </div>

  <div class="card">
    <div class="section">
      <label>Password Length — <span id="lenDisplay">16</span> characters</label>
      <div class="length-row">
        <input type="range" id="lengthSlider" min="6" max="64" value="16" oninput="onSlider(this)">
        <div class="length-val" id="lenBadge">16</div>
      </div>
    </div>

    <div class="section">
      <label>Character Types</label>
      <div class="options-grid">
        <label class="checkbox-label">
          <input type="checkbox" id="optUpper" checked>
          <span class="box"></span>
          Uppercase (A–Z)
        </label>
        <label class="checkbox-label">
          <input type="checkbox" id="optLower" checked>
          <span class="box"></span>
          Lowercase (a–z)
        </label>
        <label class="checkbox-label">
          <input type="checkbox" id="optNumbers" checked>
          <span class="box"></span>
          Numbers (0–9)
        </label>
        <label class="checkbox-label">
          <input type="checkbox" id="optSymbols" checked>
          <span class="box"></span>
          Symbols (!@#$%)
        </label>
      </div>
    </div>

    <div class="divider"></div>

    <div class="section">
      <label>Generated Password</label>
      <div class="password-display" id="pwDisplay">
        <span class="password-placeholder">Click Generate to create a password</span>
      </div>
      <div class="strength-row">
        <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
        <div class="strength-label" id="strengthLabel"></div>
      </div>
    </div>

    <div class="actions">
      <button class="btn-primary" onclick="generate()">⚡ Generate</button>
      <button class="btn-copy" id="copyBtn" onclick="copyPassword()">Copy</button>
    </div>
  </div>
</main>
<footer>
  <p>Built with ❤️ by Thezer0</p>
  <nav class="footer-nav">
    <a href="../index.html">Home</a><span class="footer-sep">|</span>
    <a href="../about.html">About</a><span class="footer-sep">|</span>
    <a href="../contact.html">Contact</a><span class="footer-sep">|</span>
    <a href="../privacy-policy.html">Privacy Policy</a><span class="footer-sep">|</span>
    <a href="../terms.html">Terms</a>
  </nav>
</footer>
<script>
  function onSlider(el) {
    const val = el.value;
    const pct = ((val - el.min) / (el.max - el.min)) * 100;
    el.style.setProperty('--pct', pct + '%');
    document.getElementById('lenDisplay').textContent = val;
    document.getElementById('lenBadge').textContent = val;
  }
  onSlider(document.getElementById('lengthSlider'));

  function generate() {
    const upper = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    const lower = "abcdefghijklmnopqrstuvwxyz";
    const nums = "0123456789";
    const syms = "!@#$%^&*()_+-=[]{}|;':\",./<>?";

    let chars = "";
    if (document.getElementById('optUpper').checked) chars += upper;
    if (document.getElementById('optLower').checked) chars += lower;
    if (document.getElementById('optNumbers').checked) chars += nums;
    if (document.getElementById('optSymbols').checked) chars += syms;

    if (!chars) { alert("Select at least one character type."); return; }

    const len = parseInt(document.getElementById('lengthSlider').value);
    let pw = "";
    const arr = new Uint32Array(len);
    crypto.getRandomValues(arr);
    arr.forEach(n => pw += chars[n % chars.length]);

    const display = document.getElementById("pwDisplay");
    display.innerHTML = pw;
    display.classList.add("has-value");
    updateStrength(pw);
  }

  function updateStrength(pw) {
    let score = 0;
    if (pw.length >= 12) score++;
    if (pw.length >= 20) score++;
    if (/[A-Z]/.test(pw)) score++;
    if (/[a-z]/.test(pw)) score++;
    if (/[0-9]/.test(pw)) score++;
    if (/[^A-Za-z0-9]/.test(pw)) score++;

    const fill = document.getElementById("strengthFill");
    const label = document.getElementById("strengthLabel");
    const pct = Math.min(100, Math.round((score / 6) * 100));
    fill.style.width = pct + "%";

    if (score <= 2) { fill.style.background = "#dc3545"; label.textContent = "Weak"; label.style.color = "#dc3545"; }
    else if (score <= 4) { fill.style.background = "#f59e0b"; label.textContent = "Fair"; label.style.color = "#f59e0b"; }
    else { fill.style.background = "#2d7a4f"; label.textContent = "Strong"; label.style.color = "#2d7a4f"; }
  }

  function copyPassword() {
    const text = document.getElementById("pwDisplay").innerText;
    if (!text || text.includes("Click Generate")) return;
    navigator.clipboard.writeText(text);
    const btn = document.getElementById("copyBtn");
    btn.textContent = "Copied!"; btn.classList.add("copied");
    setTimeout(() => { btn.textContent = "Copy"; btn.classList.remove("copied"); }, 2000);
  }
</script>
</body>
</html>
