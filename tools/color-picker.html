<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="logo.png">
<meta name="description" content="Pick colors from a palette and copy HEX codes instantly using this free color picker tool.">
<meta name="keywords" content="color picker, hex color picker, color palette tool">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="canonical" href="https://thezer0.tools/tools/color-picker.html">
<title>Color Picker Online — Thezer0 Tools</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #faf7f2; --surface: #ffffff; --border: #e8e0d0; --border-hover: #d4a96a;
    --text-primary: #1a1510; --text-secondary: #6b5f4e; --text-muted: #a89880;
    --accent: #c97c2a; --accent-light: #f5e6cc; --accent-glow: rgba(201,124,42,0.12);
    --shadow-sm: 0 1px 3px rgba(26,21,16,0.06); --shadow-hover: 0 8px 24px rgba(26,21,16,0.12);
    --radius: 12px; --transition: 0.22s cubic-bezier(0.4,0,0.2,1);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text-primary); min-height: 100vh; display: flex; flex-direction: column; -webkit-font-smoothing: antialiased; }
  body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(ellipse 80% 50% at 50% -10%, rgba(201,124,42,0.07) 0%, transparent 60%); pointer-events: none; z-index: 0; }

  nav { position: relative; z-index: 2; padding: 16px 32px; border-bottom: 1px solid var(--border); background: rgba(250,247,242,0.85); backdrop-filter: blur(8px); display: flex; align-items: center; gap: 8px; }
  nav a { font-size: 13px; color: var(--text-muted); text-decoration: none; font-family: 'DM Mono', monospace; transition: color var(--transition); }
  nav a:hover { color: var(--accent); }
  nav span { color: var(--border-hover); font-size: 12px; }
  nav .current { color: var(--text-secondary); font-weight: 500; }

  main { position: relative; z-index: 1; max-width: 760px; margin: 0 auto; padding: 48px 24px 64px; width: 100%; animation: fadeUp 0.4s ease both; }

  .tool-header { margin-bottom: 32px; }
  .tool-badge { display: inline-flex; align-items: center; background: var(--accent-light); color: var(--accent); font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; padding: 5px 12px; border-radius: 99px; border: 1px solid rgba(201,124,42,0.2); margin-bottom: 14px; }
  h1 { font-size: 28px; font-weight: 600; letter-spacing: -0.02em; margin-bottom: 6px; }
  .tool-desc { font-size: 15px; color: var(--text-secondary); font-weight: 300; }

  .card { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 28px; box-shadow: var(--shadow-sm); margin-bottom: 16px; }

  label { display: block; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text-muted); margin-bottom: 8px; font-family: 'DM Mono', monospace; }

  .divider { height: 1px; background: var(--border); margin: 24px 0; }
  .section { margin-bottom: 24px; }

  /* Color preview bar */
  .preview-bar {
    height: 72px; border-radius: 10px; background: #FF5733;
    border: 1.5px solid var(--border); transition: background 0.3s ease;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 20px;
  }
  .preview-hex {
    font-family: 'DM Mono', monospace; font-size: 18px; font-weight: 500;
    color: #fff; text-shadow: 0 1px 4px rgba(0,0,0,0.3); letter-spacing: 0.05em;
  }

  /* Native color input */
  .color-input-row { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
  input[type="color"] {
    width: 48px; height: 48px; border-radius: 8px; border: 1.5px solid var(--border);
    padding: 3px; background: var(--surface); cursor: pointer; flex-shrink: 0;
  }
  .hex-input {
    flex: 1; padding: 12px 14px; background: var(--bg); border: 1.5px solid var(--border);
    border-radius: 8px; font-family: 'DM Mono', monospace; font-size: 15px;
    color: var(--text-primary); outline: none; transition: border-color var(--transition), box-shadow var(--transition);
  }
  .hex-input:focus { border-color: var(--accent); box-shadow: 0 0 0 4px var(--accent-glow); }

  /* Palette */
  .palette-section label { margin-bottom: 12px; }
  .palette { display: grid; grid-template-columns: repeat(auto-fill, minmax(56px, 1fr)); gap: 10px; }
  .color-box {
    height: 56px; border-radius: 8px; cursor: pointer;
    border: 2px solid transparent;
    transition: transform var(--transition), box-shadow var(--transition), border-color var(--transition);
    position: relative;
  }
  .color-box:hover { transform: scale(1.08); box-shadow: var(--shadow-hover); }
  .color-box:active { transform: scale(0.96); }
  .color-box.selected { border-color: var(--text-primary); transform: scale(1.05); }

  /* Saved colors */
  .saved-row { display: flex; gap: 8px; flex-wrap: wrap; min-height: 36px; }
  .saved-swatch {
    width: 32px; height: 32px; border-radius: 6px; cursor: pointer;
    border: 1.5px solid var(--border); transition: transform var(--transition);
    position: relative;
  }
  .saved-swatch:hover { transform: scale(1.12); }
  .saved-empty { font-size: 13px; color: var(--text-muted); font-family: 'DM Mono', monospace; padding: 6px 0; }

  /* Formats */
  .format-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .format-item {
    background: var(--bg); border: 1.5px solid var(--border); border-radius: 8px;
    padding: 12px 14px; display: flex; align-items: center; justify-content: space-between;
    transition: border-color var(--transition);
  }
  .format-item:hover { border-color: var(--border-hover); }
  .format-label { font-size: 11px; font-family: 'DM Mono', monospace; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 2px; }
  .format-value { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--text-primary); font-weight: 500; }

  button { display: inline-flex; align-items: center; gap: 7px; padding: 10px 20px; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; border: 1.5px solid transparent; transition: all var(--transition); }
  .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); box-shadow: 0 2px 8px rgba(201,124,42,0.25); }
  .btn-primary:hover { background: #b56d21; transform: translateY(-1px); box-shadow: 0 4px 14px rgba(201,124,42,0.35); }
  .btn-secondary { background: var(--surface); color: var(--text-secondary); border-color: var(--border); }
  .btn-secondary:hover { border-color: var(--border-hover); color: var(--accent); transform: translateY(-1px); }
  .btn-copy { background: var(--surface); color: var(--text-muted); border-color: var(--border); font-size: 13px; padding: 7px 13px; }
  .btn-copy:hover { border-color: var(--border-hover); color: var(--accent); }
  .btn-copy.copied { background: var(--accent-light); border-color: var(--accent); color: var(--accent); }

  .actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 20px; }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
  @media (max-width: 540px) { .format-grid { grid-template-columns: 1fr; } nav { padding: 14px 16px; } main { padding: 32px 16px 48px; } }
</style>
</head>
<body>
<nav>
  <a href="../index.html">Thezer0 Tools</a>
  <span>›</span>
  <span class="current">Color Picker</span>
</nav>
<main>
  <div class="tool-header">
    <div class="tool-badge">🎨 Color</div>
    <h1>Color Picker</h1>
    <p class="tool-desc">Pick, browse, and copy colors in HEX, RGB, and HSL formats.</p>
  </div>

  <div class="card">
    <div class="preview-bar" id="previewBar">
      <span class="preview-hex" id="previewHex">#FF5733</span>
    </div>

    <div class="color-input-row">
      <input type="color" id="colorWheel" value="#FF5733" oninput="onWheelChange(this.value)">
      <input type="text" class="hex-input" id="hexInput" value="#FF5733" placeholder="#000000" oninput="onHexInput(this.value)" maxlength="7">
      <button class="btn-primary" onclick="saveColor()">+ Save</button>
    </div>

    <div class="section palette-section">
      <label>Quick Palette</label>
      <div class="palette" id="palette"></div>
    </div>

    <div class="divider"></div>

    <div class="section">
      <label>Color Formats</label>
      <div class="format-grid">
        <div class="format-item">
          <div><div class="format-label">HEX</div><div class="format-value" id="fmtHex">#FF5733</div></div>
          <button class="btn-copy" onclick="copyFmt('fmtHex', this)">Copy</button>
        </div>
        <div class="format-item">
          <div><div class="format-label">RGB</div><div class="format-value" id="fmtRgb">rgb(255, 87, 51)</div></div>
          <button class="btn-copy" onclick="copyFmt('fmtRgb', this)">Copy</button>
        </div>
        <div class="format-item">
          <div><div class="format-label">HSL</div><div class="format-value" id="fmtHsl">hsl(11, 100%, 60%)</div></div>
          <button class="btn-copy" onclick="copyFmt('fmtHsl', this)">Copy</button>
        </div>
        <div class="format-item">
          <div><div class="format-label">CSS Var</div><div class="format-value" id="fmtVar">--color: #FF5733</div></div>
          <button class="btn-copy" onclick="copyFmt('fmtVar', this)">Copy</button>
        </div>
      </div>
    </div>

    <div class="divider"></div>

    <div class="section">
      <label>Saved Colors</label>
      <div class="saved-row" id="savedRow">
        <span class="saved-empty">No colors saved yet</span>
      </div>
    </div>
  </div>
</main>

<script>
  const palette = [
    '#FF5733','#FF8C42','#F1C40F','#2ECC71','#1ABC9C',
    '#3498DB','#9B59B6','#E74C3C','#E67E22','#27AE60',
    '#2980B9','#8E44AD','#F39C12','#16A085','#C0392B',
    '#D35400','#7F8C8D','#2C3E50','#ECF0F1','#BDC3C7'
  ];

  let current = '#FF5733';
  let saved = [];

  function buildPalette() {
    const el = document.getElementById('palette');
    el.innerHTML = palette.map(c =>
      `<div class="color-box" style="background:${c}" onclick="setColor('${c}')" title="${c}"></div>`
    ).join('');
  }

  function setColor(hex) {
    hex = hex.toUpperCase();
    if (!/^#[0-9A-F]{6}$/i.test(hex)) return;
    current = hex;
    document.getElementById('colorWheel').value = hex;
    document.getElementById('hexInput').value = hex;
    document.getElementById('previewBar').style.background = hex;
    document.getElementById('previewHex').textContent = hex;

    // Update text color for readability
    const brightness = hexBrightness(hex);
    document.getElementById('previewHex').style.color = brightness > 140 ? '#1a1510' : '#fff';

    updateFormats(hex);

    // Highlight selected
    document.querySelectorAll('.color-box').forEach(b => b.classList.remove('selected'));
    document.querySelectorAll('.color-box').forEach(b => {
      if (b.style.background === hex || b.style.background === hexToRgb(hex)) b.classList.add('selected');
    });
  }

  function onWheelChange(val) { setColor(val); }
  function onHexInput(val) {
    if (/^#[0-9A-Fa-f]{6}$/.test(val)) setColor(val);
  }

  function hexBrightness(hex) {
    const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
    return 0.299*r + 0.587*g + 0.114*b;
  }

  function hexToRgb(hex) {
    const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
    return `rgb(${r}, ${g}, ${b})`;
  }

  function hexToHsl(hex) {
    let r = parseInt(hex.slice(1,3),16)/255, g = parseInt(hex.slice(3,5),16)/255, b = parseInt(hex.slice(5,7),16)/255;
    const max = Math.max(r,g,b), min = Math.min(r,g,b);
    let h, s, l = (max+min)/2;
    if (max === min) { h = s = 0; }
    else {
      const d = max - min;
      s = l > 0.5 ? d/(2-max-min) : d/(max+min);
      switch(max) {
        case r: h = ((g-b)/d + (g<b?6:0))/6; break;
        case g: h = ((b-r)/d + 2)/6; break;
        case b: h = ((r-g)/d + 4)/6; break;
      }
    }
    return `hsl(${Math.round(h*360)}, ${Math.round(s*100)}%, ${Math.round(l*100)}%)`;
  }

  function updateFormats(hex) {
    document.getElementById('fmtHex').textContent = hex;
    document.getElementById('fmtRgb').textContent = hexToRgb(hex);
    document.getElementById('fmtHsl').textContent = hexToHsl(hex);
    document.getElementById('fmtVar').textContent = `--color: ${hex}`;
  }

  function saveColor() {
    if (saved.includes(current)) return;
    saved.push(current);
    renderSaved();
  }

  function renderSaved() {
    const row = document.getElementById('savedRow');
    if (!saved.length) { row.innerHTML = '<span class="saved-empty">No colors saved yet</span>'; return; }
    row.innerHTML = saved.map(c =>
      `<div class="saved-swatch" style="background:${c}" title="${c}" onclick="setColor('${c}')"></div>`
    ).join('');
  }

  function copyFmt(id, btn) {
    navigator.clipboard.writeText(document.getElementById(id).textContent);
    btn.textContent = 'Copied!'; btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
  }

  buildPalette();
  setColor('#FF5733');
</script>
</body>
</html>
