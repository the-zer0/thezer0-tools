<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="logo.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSON Validator — Thezer0 Tools</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#faf7f2;--surface:#ffffff;--border:#e8e0d0;--border-hover:#d4a96a;
    --text-primary:#1a1510;--text-secondary:#6b5f4e;--text-muted:#a89880;
    --accent:#c97c2a;--accent-light:#f5e6cc;--accent-glow:rgba(201,124,42,0.12);
    --ok:#2d7a4f;--ok-light:#f0fff4;--err:#dc3545;--err-light:#fff0f0;
    --warn:#d97706;--warn-light:#fffbeb;
    --shadow-sm:0 1px 3px rgba(26,21,16,0.06);--radius:12px;--transition:0.22s cubic-bezier(0.4,0,0.2,1);
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text-primary);min-height:100vh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased;}
  body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(201,124,42,0.07) 0%,transparent 60%);pointer-events:none;z-index:0;}
  nav{position:relative;z-index:2;padding:16px 32px;border-bottom:1px solid var(--border);background:rgba(250,247,242,0.85);backdrop-filter:blur(8px);display:flex;align-items:center;gap:8px;}
  nav a{font-size:13px;color:var(--text-muted);text-decoration:none;font-family:'DM Mono',monospace;transition:color var(--transition);}
  nav a:hover{color:var(--accent);}
  nav span{color:var(--border-hover);font-size:12px;}
  nav .current{color:var(--text-secondary);font-weight:500;}
  main{position:relative;z-index:1;max-width:860px;margin:0 auto;padding:48px 24px 64px;width:100%;animation:fadeUp 0.4s ease both;}
  .tool-header{margin-bottom:32px;}
  .tool-badge{display:inline-flex;align-items:center;background:var(--accent-light);color:var(--accent);font-family:'DM Mono',monospace;font-size:11px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;padding:5px 12px;border-radius:99px;border:1px solid rgba(201,124,42,0.2);margin-bottom:14px;}
  h1{font-size:28px;font-weight:600;letter-spacing:-0.02em;margin-bottom:6px;}
  .tool-desc{font-size:15px;color:var(--text-secondary);font-weight:300;}
  .card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:28px;box-shadow:var(--shadow-sm);}
  label{display:block;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.07em;color:var(--text-muted);margin-bottom:8px;font-family:'DM Mono',monospace;}
  .section{margin-bottom:20px;}
  .divider{height:1px;background:var(--border);margin:24px 0;}
  .editor-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px;}
  @media(max-width:600px){.editor-grid{grid-template-columns:1fr;}}
  .pane-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
  textarea{width:100%;padding:14px;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;font-family:'DM Mono',monospace;font-size:13px;color:var(--text-primary);resize:vertical;min-height:300px;outline:none;transition:border-color var(--transition),box-shadow var(--transition);line-height:1.7;}
  textarea:focus{border-color:var(--accent);box-shadow:0 0 0 4px var(--accent-glow);}
  textarea::placeholder{color:var(--text-muted);}
  textarea.err{border-color:var(--err);background:var(--err-light);}
  textarea.ok{border-color:var(--ok);}

  /* Status banner */
  .status-banner{display:none;align-items:flex-start;gap:12px;padding:14px 16px;border-radius:8px;margin-bottom:20px;font-size:14px;}
  .status-banner.visible{display:flex;}
  .status-banner.ok{background:var(--ok-light);border:1.5px solid #a7f3c8;color:var(--ok);}
  .status-banner.err{background:var(--err-light);border:1.5px solid #fecaca;color:var(--err);}
  .status-icon{font-size:18px;flex-shrink:0;margin-top:1px;}
  .status-body{flex:1;}
  .status-title{font-weight:600;margin-bottom:2px;}
  .status-detail{font-family:'DM Mono',monospace;font-size:12px;opacity:0.85;line-height:1.5;}

  /* Stats row */
  .stats-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px;}
  .stat-chip{background:var(--bg);border:1.5px solid var(--border);border-radius:8px;padding:8px 14px;font-family:'DM Mono',monospace;font-size:12px;color:var(--text-secondary);}
  .stat-chip span{color:var(--accent);font-weight:500;}

  button{display:inline-flex;align-items:center;gap:7px;padding:10px 20px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;border:1.5px solid transparent;transition:all var(--transition);}
  .btn-primary{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 2px 8px rgba(201,124,42,0.25);}
  .btn-primary:hover{background:#b56d21;transform:translateY(-1px);box-shadow:0 4px 14px rgba(201,124,42,0.35);}
  .btn-primary:active{transform:translateY(0);}
  .btn-secondary{background:var(--surface);color:var(--text-secondary);border-color:var(--border);}
  .btn-secondary:hover{border-color:var(--border-hover);color:var(--accent);transform:translateY(-1px);}
  .btn-copy{background:var(--surface);color:var(--text-muted);border-color:var(--border);font-size:13px;padding:7px 13px;}
  .btn-copy:hover{border-color:var(--border-hover);color:var(--accent);}
  .btn-copy.copied{background:var(--accent-light);border-color:var(--accent);color:var(--accent);}
  .actions{display:flex;gap:10px;flex-wrap:wrap;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
  @media(max-width:480px){nav{padding:14px 16px;}main{padding:32px 16px 48px;}}
</style>
</head>
<body>
<nav><a href="../index.html">Thezer0 Tools</a><span>›</span><span class="current">JSON Validator</span></nav>
<main>
  <div class="tool-header">
    <div class="tool-badge">✓ Validate</div>
    <h1>JSON Validator</h1>
    <p class="tool-desc">Validate, format, and inspect JSON with detailed error messages.</p>
  </div>
  <div class="card">
    <div class="status-banner" id="statusBanner">
      <div class="status-icon" id="statusIcon"></div>
      <div class="status-body">
        <div class="status-title" id="statusTitle"></div>
        <div class="status-detail" id="statusDetail"></div>
      </div>
    </div>

    <div class="editor-grid">
      <div>
        <div class="pane-header">
          <label style="margin:0">Input JSON</label>
          <button class="btn-copy" style="padding:5px 12px;font-size:12px" onclick="clearAll()">Clear</button>
        </div>
        <textarea id="input" placeholder='{"name": "value"}' oninput="onInput()"></textarea>
      </div>
      <div>
        <div class="pane-header">
          <label style="margin:0">Formatted Output</label>
          <button class="btn-copy" id="copyBtn" onclick="copyOut()">Copy</button>
        </div>
        <textarea id="output" placeholder="Formatted JSON appears here…" readonly></textarea>
      </div>
    </div>

    <div class="stats-row" id="statsRow" style="display:none">
      <div class="stat-chip">Keys: <span id="statKeys">0</span></div>
      <div class="stat-chip">Depth: <span id="statDepth">0</span></div>
      <div class="stat-chip">Size: <span id="statSize">0 B</span></div>
      <div class="stat-chip">Type: <span id="statType">—</span></div>
    </div>

    <div class="actions">
      <button class="btn-primary" onclick="validate()">⚡ Validate & Format</button>
      <button class="btn-secondary" onclick="minify()">Minify</button>
      <button class="btn-secondary" onclick="sortKeys()">Sort Keys</button>
    </div>
  </div>
</main>
<script>
  function onInput() { if (document.getElementById('input').value.trim()) validate(); }

  function validate() {
    const raw = document.getElementById('input').value.trim();
    const input = document.getElementById('input');
    const output = document.getElementById('output');
    const banner = document.getElementById('statusBanner');
    if (!raw) { banner.className = 'status-banner'; output.value = ''; return; }
    try {
      const obj = JSON.parse(raw);
      output.value = JSON.stringify(obj, null, 2);
      input.className = 'ok'; output.className = 'ok';
      showBanner('ok', '✓ Valid JSON', `Parsed successfully · ${raw.length} characters`);
      showStats(obj, raw);
    } catch(e) {
      input.className = 'err'; output.value = '';
      showBanner('err', '✗ Invalid JSON', e.message);
      document.getElementById('statsRow').style.display = 'none';
    }
  }

  function minify() {
    try {
      const obj = JSON.parse(document.getElementById('input').value);
      document.getElementById('output').value = JSON.stringify(obj);
      showBanner('ok', '✓ Minified', '');
    } catch(e) { showBanner('err', '✗ Invalid JSON', e.message); }
  }

  function sortKeys() {
    try {
      const obj = JSON.parse(document.getElementById('input').value);
      document.getElementById('output').value = JSON.stringify(sortObj(obj), null, 2);
      showBanner('ok', '✓ Keys sorted', '');
    } catch(e) { showBanner('err', '✗ Invalid JSON', e.message); }
  }

  function sortObj(obj) {
    if (Array.isArray(obj)) return obj.map(sortObj);
    if (obj && typeof obj === 'object') return Object.fromEntries(Object.keys(obj).sort().map(k => [k, sortObj(obj[k])]));
    return obj;
  }

  function showBanner(type, title, detail) {
    const b = document.getElementById('statusBanner');
    b.className = `status-banner visible ${type}`;
    document.getElementById('statusIcon').textContent = type === 'ok' ? '✓' : '✗';
    document.getElementById('statusTitle').textContent = title;
    document.getElementById('statusDetail').textContent = detail;
  }

  function showStats(obj, raw) {
    document.getElementById('statsRow').style.display = 'flex';
    document.getElementById('statKeys').textContent = countKeys(obj);
    document.getElementById('statDepth').textContent = getDepth(obj);
    document.getElementById('statSize').textContent = formatBytes(new Blob([raw]).size);
    document.getElementById('statType').textContent = Array.isArray(obj) ? 'Array' : typeof obj === 'object' ? 'Object' : typeof obj;
  }

  function countKeys(obj) {
    if (!obj || typeof obj !== 'object') return 0;
    return Object.keys(obj).length + Object.values(obj).reduce((a, v) => a + countKeys(v), 0);
  }
  function getDepth(obj) {
    if (!obj || typeof obj !== 'object') return 0;
    return 1 + Math.max(0, ...Object.values(obj).map(getDepth));
  }
  function formatBytes(b) { return b < 1024 ? b+' B' : (b/1024).toFixed(1)+' KB'; }

  function clearAll() {
    ['input','output'].forEach(id => { document.getElementById(id).value = ''; document.getElementById(id).className = ''; });
    document.getElementById('statusBanner').className = 'status-banner';
    document.getElementById('statsRow').style.display = 'none';
  }

  function copyOut() {
    const v = document.getElementById('output').value; if (!v) return;
    navigator.clipboard.writeText(v);
    const btn = document.getElementById('copyBtn');
    btn.textContent = 'Copied!'; btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
  }
</script>
</body>
</html>
