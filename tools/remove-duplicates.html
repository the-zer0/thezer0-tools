<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="../logo.png">
<link rel="stylesheet" href="../style.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Remove Duplicate Lines Online — Thezer0 Tools</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{--bg:#faf7f2;--surface:#ffffff;--border:#e8e0d0;--border-hover:#d4a96a;--text-primary:#1a1510;--text-secondary:#6b5f4e;--text-muted:#a89880;--accent:#c97c2a;--accent-light:#f5e6cc;--accent-glow:rgba(201,124,42,0.12);--shadow-sm:0 1px 3px rgba(26,21,16,0.06);--radius:12px;--transition:0.22s cubic-bezier(0.4,0,0.2,1);}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text-primary);min-height:100vh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased;}
  body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(201,124,42,0.07) 0%,transparent 60%);pointer-events:none;z-index:0;}
  nav{position:relative;z-index:2;padding:16px 32px;border-bottom:1px solid var(--border);background:rgba(250,247,242,0.85);backdrop-filter:blur(8px);display:flex;align-items:center;gap:8px;}
  nav a{font-size:13px;color:var(--text-muted);text-decoration:none;font-family:'DM Mono',monospace;transition:color var(--transition);}
  nav a:hover{color:var(--accent);}
  nav span{color:var(--border-hover);font-size:12px;}
  nav .current{color:var(--text-secondary);font-weight:500;}
  main{position:relative;z-index:1;max-width:820px;margin:0 auto;padding:48px 24px 64px;width:100%;animation:fadeUp 0.4s ease both;}
  .tool-header{margin-bottom:32px;}
  .tool-badge{display:inline-flex;align-items:center;background:var(--accent-light);color:var(--accent);font-family:'DM Mono',monospace;font-size:11px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;padding:5px 12px;border-radius:99px;border:1px solid rgba(201,124,42,0.2);margin-bottom:14px;}
  h1{font-size:28px;font-weight:600;letter-spacing:-0.02em;margin-bottom:6px;}
  .tool-desc{font-size:15px;color:var(--text-secondary);font-weight:300;}
  .card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:28px;box-shadow:var(--shadow-sm);}
  label{display:block;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.07em;color:var(--text-muted);margin-bottom:8px;font-family:'DM Mono',monospace;}
  .section{margin-bottom:20px;}
  .divider{height:1px;background:var(--border);margin:24px 0;}

  .editor-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px;}
  @media(max-width:600px){.editor-grid{grid-template-columns:1fr;}}
  .pane-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
  textarea{width:100%;padding:14px;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;font-family:'DM Mono',monospace;font-size:13px;color:var(--text-primary);resize:vertical;min-height:260px;outline:none;transition:border-color var(--transition),box-shadow var(--transition);line-height:1.7;}
  textarea:focus{border-color:var(--accent);box-shadow:0 0 0 4px var(--accent-glow);}
  textarea::placeholder{color:var(--text-muted);}

  /* Options */
  .opts-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px;}
  .opt-toggle{display:flex;align-items:center;gap:8px;padding:8px 14px;border:1.5px solid var(--border);border-radius:8px;cursor:pointer;font-size:13px;color:var(--text-secondary);background:var(--surface);transition:all var(--transition);user-select:none;}
  .opt-toggle:hover{border-color:var(--border-hover);color:var(--text-primary);}
  .opt-toggle input{display:none;}
  .opt-toggle .tog{width:16px;height:16px;border-radius:4px;border:2px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;transition:all var(--transition);}
  .opt-toggle input:checked ~ .tog{background:var(--accent);border-color:var(--accent);color:#fff;}
  .opt-toggle input:checked ~ .tog::after{content:'✓';}
  .opt-toggle:has(input:checked){border-color:var(--border-hover);background:rgba(201,124,42,0.04);}

  /* Stats chips */
  .stats-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;}
  .stat-chip{background:var(--bg);border:1.5px solid var(--border);border-radius:8px;padding:8px 14px;font-family:'DM Mono',monospace;font-size:12px;color:var(--text-secondary);}
  .stat-chip span{color:var(--accent);font-weight:600;}
  .stat-chip.removed span{color:#dc3545;}

  button{display:inline-flex;align-items:center;gap:7px;padding:10px 20px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;border:1.5px solid transparent;transition:all var(--transition);}
  .btn-primary{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 2px 8px rgba(201,124,42,0.25);}
  .btn-primary:hover{background:#b56d21;transform:translateY(-1px);}
  .btn-copy{background:var(--surface);color:var(--text-muted);border-color:var(--border);font-size:13px;padding:7px 13px;}
  .btn-copy:hover{border-color:var(--border-hover);color:var(--accent);}
  .btn-copy.copied{background:var(--accent-light);border-color:var(--accent);color:var(--accent);}
  .btn-secondary{background:var(--surface);color:var(--text-secondary);border-color:var(--border);}
  .btn-secondary:hover{border-color:var(--border-hover);color:var(--accent);}
  .actions{display:flex;gap:10px;flex-wrap:wrap;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
  @media(max-width:480px){nav{padding:14px 16px;}main{padding:32px 16px 48px;}}
</style>
</head>
<body>
<nav><a href="../index.html">Thezer0 Tools</a><span>›</span><span class="current">Remove Duplicate Lines</span></nav>
<main>
  <div class="tool-header">
    <div class="tool-badge">≠ Deduplicate</div>
    <h1>Remove Duplicate Lines</h1>
    <p class="tool-desc">Paste any text and instantly remove repeated lines with custom options.</p>
  </div>
  <div class="card">
    <div class="section">
      <label>Options</label>
      <div class="opts-row">
        <label class="opt-toggle"><input type="checkbox" id="optCase"><span class="tog"></span>Case-insensitive</label>
        <label class="opt-toggle"><input type="checkbox" id="optTrim" checked><span class="tog"></span>Trim whitespace</label>
        <label class="opt-toggle"><input type="checkbox" id="optEmpty"><span class="tog"></span>Remove blank lines</label>
        <label class="opt-toggle"><input type="checkbox" id="optSort"><span class="tog"></span>Sort output</label>
      </div>
    </div>

    <div class="editor-grid">
      <div>
        <div class="pane-header">
          <label style="margin:0">Input</label>
          <button class="btn-secondary" style="padding:5px 10px;font-size:12px" onclick="document.getElementById('input').value='';run()">Clear</button>
        </div>
        <textarea id="input" placeholder="Paste lines here..." oninput="run()"></textarea>
      </div>
      <div>
        <div class="pane-header">
          <label style="margin:0">Output</label>
          <button class="btn-copy" id="copyBtn" onclick="copyOut()">Copy</button>
        </div>
        <textarea id="output" placeholder="Result appears here…" readonly></textarea>
      </div>
    </div>

    <div class="stats-row">
      <div class="stat-chip">Total lines: <span id="statTotal">0</span></div>
      <div class="stat-chip removed">Duplicates removed: <span id="statRemoved">0</span></div>
      <div class="stat-chip">Unique lines: <span id="statUnique">0</span></div>
    </div>

    <div class="actions">
      <button class="btn-primary" onclick="run()">⚡ Remove Duplicates</button>
    </div>
  </div>
</main>
<footer>
  <p>Built with ❤️ by Thezer0</p>
  <nav class="footer-nav">
    <a href="../index.html">Home</a><span class="footer-sep">|</span>
    <a href="../about.html">About</a><span class="footer-sep">|</span>
    <a href="../contact.html">Contact</a><span class="footer-sep">|</span>
    <a href="../privacy-policy.html">Privacy Policy</a><span class="footer-sep">|</span>
    <a href="../terms.html">Terms</a>
  </nav>
</footer>
<script>
  function run() {
    const raw = document.getElementById('input').value;
    const caseInsensitive = document.getElementById('optCase').checked;
    const trim = document.getElementById('optTrim').checked;
    const removeEmpty = document.getElementById('optEmpty').checked;
    const sort = document.getElementById('optSort').checked;

    let lines = raw.split('\n');
    const total = lines.length;

    if (trim) lines = lines.map(l => l.trim());
    if (removeEmpty) lines = lines.filter(l => l !== '');

    const seen = new Set();
    const unique = lines.filter(l => {
      const key = caseInsensitive ? l.toLowerCase() : l;
      if (seen.has(key)) return false;
      seen.add(key); return true;
    });

    const result = sort ? [...unique].sort((a, b) => a.localeCompare(b)) : unique;

    document.getElementById('output').value = result.join('\n');
    document.getElementById('statTotal').textContent = total;
    document.getElementById('statRemoved').textContent = total - result.length;
    document.getElementById('statUnique').textContent = result.length;
  }

  function copyOut() {
    const v = document.getElementById('output').value; if (!v) return;
    navigator.clipboard.writeText(v);
    const btn = document.getElementById('copyBtn');
    btn.textContent = 'Copied!'; btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
  }

  // Run on option change
  ['optCase','optTrim','optEmpty','optSort'].forEach(id => document.getElementById(id).addEventListener('change', run));
</script>
</body>
</html>
