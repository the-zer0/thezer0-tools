<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Counter — Thezer0 Tools</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #faf7f2; --surface: #ffffff; --border: #e8e0d0; --border-hover: #d4a96a;
    --text-primary: #1a1510; --text-secondary: #6b5f4e; --text-muted: #a89880;
    --accent: #c97c2a; --accent-light: #f5e6cc; --accent-glow: rgba(201,124,42,0.12);
    --shadow-sm: 0 1px 3px rgba(26,21,16,0.06); --radius: 12px;
    --transition: 0.22s cubic-bezier(0.4,0,0.2,1);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text-primary); min-height: 100vh; display: flex; flex-direction: column; -webkit-font-smoothing: antialiased; }
  body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(ellipse 80% 50% at 50% -10%, rgba(201,124,42,0.07) 0%, transparent 60%); pointer-events: none; z-index: 0; }

  nav { position: relative; z-index: 2; padding: 16px 32px; border-bottom: 1px solid var(--border); background: rgba(250,247,242,0.85); backdrop-filter: blur(8px); display: flex; align-items: center; gap: 8px; }
  nav a { font-size: 13px; color: var(--text-muted); text-decoration: none; font-family: 'DM Mono', monospace; transition: color var(--transition); }
  nav a:hover { color: var(--accent); }
  nav span { color: var(--border-hover); font-size: 12px; }
  nav .current { color: var(--text-secondary); font-weight: 500; }

  main { position: relative; z-index: 1; max-width: 720px; margin: 0 auto; padding: 48px 24px 64px; width: 100%; animation: fadeUp 0.4s ease both; }

  .tool-header { margin-bottom: 32px; }
  .tool-badge { display: inline-flex; align-items: center; background: var(--accent-light); color: var(--accent); font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; padding: 5px 12px; border-radius: 99px; border: 1px solid rgba(201,124,42,0.2); margin-bottom: 14px; }
  h1 { font-size: 28px; font-weight: 600; letter-spacing: -0.02em; margin-bottom: 6px; }
  .tool-desc { font-size: 15px; color: var(--text-secondary); font-weight: 300; }

  .card { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 28px; box-shadow: var(--shadow-sm); }

  label { display: block; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text-muted); margin-bottom: 8px; font-family: 'DM Mono', monospace; }

  textarea { width: 100%; padding: 14px; background: var(--bg); border: 1.5px solid var(--border); border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 15px; color: var(--text-primary); resize: vertical; min-height: 220px; outline: none; transition: border-color var(--transition), box-shadow var(--transition); line-height: 1.7; }
  textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 4px var(--accent-glow); }
  textarea::placeholder { color: var(--text-muted); }

  /* Stats grid */
  .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-top: 20px; }

  .stat-card {
    background: var(--bg); border: 1.5px solid var(--border); border-radius: 10px;
    padding: 16px; text-align: center; transition: all var(--transition);
  }
  .stat-card:hover { border-color: var(--border-hover); transform: translateY(-2px); }
  .stat-value {
    font-family: 'DM Mono', monospace; font-size: 26px; font-weight: 500;
    color: var(--accent); line-height: 1.1; margin-bottom: 4px;
    transition: transform 0.15s ease;
  }
  .stat-value.bump { transform: scale(1.15); }
  .stat-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text-muted); font-weight: 600; font-family: 'DM Mono', monospace; }

  /* Clear button */
  .textarea-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  button { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: 7px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; border: 1.5px solid var(--border); background: var(--surface); color: var(--text-muted); transition: all var(--transition); }
  button:hover { border-color: var(--border-hover); color: var(--accent); }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
  @media (max-width: 540px) { .stats-grid { grid-template-columns: 1fr 1fr; } main { padding: 32px 16px 48px; } nav { padding: 14px 16px; } }
</style>
</head>
<body>

<nav>
  <a href="../index.html">Thezer0 Tools</a>
  <span>›</span>
  <span class="current">Word Counter</span>
</nav>

<main>
  <div class="tool-header">
    <div class="tool-badge">Aa</div>
    <h1>Word Counter</h1>
    <p class="tool-desc">Paste or type any text to see live word, character, and reading stats.</p>
  </div>

  <div class="card">
    <div class="textarea-header">
      <label style="margin:0">Your Text</label>
      <button onclick="clearText()">Clear</button>
    </div>
    <textarea id="text" oninput="countWords()" placeholder="Start typing or paste your text here..."></textarea>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-value" id="words">0</div>
        <div class="stat-label">Words</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="chars">0</div>
        <div class="stat-label">Characters</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="sentences">0</div>
        <div class="stat-label">Sentences</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="readTime">0m</div>
        <div class="stat-label">Read Time</div>
      </div>
    </div>
  </div>
</main>

<script>
  function bump(id) {
    const el = document.getElementById(id);
    el.classList.remove("bump");
    void el.offsetWidth;
    el.classList.add("bump");
    setTimeout(() => el.classList.remove("bump"), 150);
  }

  function countWords() {
    const text = document.getElementById("text").value;

    const charCount = text.length;
    const words = text.trim() === "" ? 0 : text.trim().split(/\s+/).length;
    const sentences = text.trim() === "" ? 0 : (text.match(/[^.!?]+[.!?]+/g) || []).length;
    const mins = Math.ceil(words / 200);
    const readTime = mins < 1 ? "<1m" : mins + "m";

    document.getElementById("chars").textContent = charCount; bump("chars");
    document.getElementById("words").textContent = words; bump("words");
    document.getElementById("sentences").textContent = sentences; bump("sentences");
    document.getElementById("readTime").textContent = readTime; bump("readTime");
  }

  function clearText() {
    document.getElementById("text").value = "";
    countWords();
  }
</script>
</body>
</html>
