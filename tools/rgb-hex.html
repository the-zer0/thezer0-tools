<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="logo.png">
<meta name="description" content="Convert RGB color values to HEX color codes instantly with this free RGB to HEX converter.">
<meta name="keywords" content="rgb to hex converter, rgb color converter, hex color tool">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="canonical" href="https://thezer0.tools/tools/rgb-hex.html">
<title>RGB ↔ Hex Online — Thezer0 Tools</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #faf7f2; --surface: #ffffff; --border: #e8e0d0; --border-hover: #d4a96a;
    --text-primary: #1a1510; --text-secondary: #6b5f4e; --text-muted: #a89880;
    --accent: #c97c2a; --accent-light: #f5e6cc; --accent-glow: rgba(201,124,42,0.12);
    --shadow-sm: 0 1px 3px rgba(26,21,16,0.06); --radius: 12px; --transition: 0.22s cubic-bezier(0.4,0,0.2,1);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text-primary); min-height: 100vh; display: flex; flex-direction: column; -webkit-font-smoothing: antialiased; }
  body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(ellipse 80% 50% at 50% -10%, rgba(201,124,42,0.07) 0%, transparent 60%); pointer-events: none; z-index: 0; }

  nav { position: relative; z-index: 2; padding: 16px 32px; border-bottom: 1px solid var(--border); background: rgba(250,247,242,0.85); backdrop-filter: blur(8px); display: flex; align-items: center; gap: 8px; }
  nav a { font-size: 13px; color: var(--text-muted); text-decoration: none; font-family: 'DM Mono', monospace; transition: color var(--transition); }
  nav a:hover { color: var(--accent); }
  nav span { color: var(--border-hover); font-size: 12px; }
  nav .current { color: var(--text-secondary); font-weight: 500; }

  main { position: relative; z-index: 1; max-width: 680px; margin: 0 auto; padding: 48px 24px 64px; width: 100%; animation: fadeUp 0.4s ease both; }
  .tool-header { margin-bottom: 32px; }
  .tool-badge { display: inline-flex; align-items: center; background: var(--accent-light); color: var(--accent); font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; padding: 5px 12px; border-radius: 99px; border: 1px solid rgba(201,124,42,0.2); margin-bottom: 14px; }
  h1 { font-size: 28px; font-weight: 600; letter-spacing: -0.02em; margin-bottom: 6px; }
  .tool-desc { font-size: 15px; color: var(--text-secondary); font-weight: 300; }

  .card { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 28px; box-shadow: var(--shadow-sm); margin-bottom: 16px; }
  label { display: block; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text-muted); margin-bottom: 8px; font-family: 'DM Mono', monospace; }
  .section { margin-bottom: 24px; }
  .divider { height: 1px; background: var(--border); margin: 24px 0; }

  /* Tabs */
  .tabs { display: flex; gap: 0; border: 1.5px solid var(--border); border-radius: 8px; overflow: hidden; margin-bottom: 24px; }
  .tab { flex: 1; padding: 10px; text-align: center; font-size: 13px; font-weight: 500; cursor: pointer; background: var(--surface); color: var(--text-secondary); transition: all var(--transition); border: none; font-family: 'DM Mono', monospace; }
  .tab + .tab { border-left: 1.5px solid var(--border); }
  .tab.active { background: var(--accent-light); color: var(--accent); }

  /* Color preview */
  .preview-bar { height: 80px; border-radius: 10px; border: 1.5px solid var(--border); margin-bottom: 20px; transition: background 0.2s ease; display: flex; align-items: center; justify-content: center; }
  .preview-label { font-family: 'DM Mono', monospace; font-size: 16px; font-weight: 500; text-shadow: 0 1px 4px rgba(0,0,0,0.25); letter-spacing: 0.04em; }

  /* RGB sliders */
  .rgb-sliders { display: flex; flex-direction: column; gap: 16px; }
  .slider-row { display: flex; align-items: center; gap: 12px; }
  .slider-channel { width: 28px; font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 600; text-transform: uppercase; flex-shrink: 0; }
  .slider-channel.r { color: #e74c3c; }
  .slider-channel.g { color: #2ecc71; }
  .slider-channel.b { color: #3498db; }
  input[type="range"] {
    -webkit-appearance: none; flex: 1; height: 6px; border-radius: 99px;
    outline: none; cursor: pointer;
  }
  .r-slider { background: linear-gradient(to right, #000, #ff0000); }
  .g-slider { background: linear-gradient(to right, #000, #00ff00); }
  .b-slider { background: linear-gradient(to right, #000, #0000ff); }
  input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: #fff; border: 2.5px solid #999; box-shadow: 0 1px 4px rgba(0,0,0,0.2); cursor: pointer; }
  .slider-num { width: 44px; text-align: center; font-family: 'DM Mono', monospace; font-size: 14px; font-weight: 500; color: var(--text-primary); background: var(--bg); border: 1.5px solid var(--border); border-radius: 6px; padding: 4px 6px; outline: none; }
  .slider-num:focus { border-color: var(--accent); }

  /* Hex input */
  .hex-row { display: flex; gap: 10px; align-items: center; }
  .hex-field { flex: 1; padding: 12px 14px; background: var(--bg); border: 1.5px solid var(--border); border-radius: 8px; font-family: 'DM Mono', monospace; font-size: 16px; color: var(--text-primary); outline: none; text-transform: uppercase; letter-spacing: 0.05em; transition: border-color var(--transition), box-shadow var(--transition); }
  .hex-field:focus { border-color: var(--accent); box-shadow: 0 0 0 4px var(--accent-glow); }

  /* Output formats */
  .format-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .format-item { background: var(--bg); border: 1.5px solid var(--border); border-radius: 8px; padding: 12px 14px; display: flex; align-items: center; justify-content: space-between; transition: border-color var(--transition); }
  .format-item:hover { border-color: var(--border-hover); }
  .format-lbl { font-size: 11px; font-family: 'DM Mono', monospace; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 2px; }
  .format-val { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--text-primary); font-weight: 500; }

  button { display: inline-flex; align-items: center; gap: 7px; padding: 10px 20px; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; border: 1.5px solid transparent; transition: all var(--transition); }
  .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); box-shadow: 0 2px 8px rgba(201,124,42,0.25); }
  .btn-primary:hover { background: #b56d21; transform: translateY(-1px); }
  .btn-copy { background: var(--surface); color: var(--text-muted); border-color: var(--border); font-size: 13px; padding: 7px 13px; }
  .btn-copy:hover { border-color: var(--border-hover); color: var(--accent); }
  .btn-copy.copied { background: var(--accent-light); border-color: var(--accent); color: var(--accent); }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
  @media (max-width: 520px) { .format-grid { grid-template-columns: 1fr; } nav { padding: 14px 16px; } main { padding: 32px 16px 48px; } }
</style>
</head>
<body>
<nav>
  <a href="../index.html">Free Dev Tools</a>
  <span>›</span>
  <span class="current">RGB ↔ Hex</span>
</nav>
<main>
  <div class="tool-header">
    <div class="tool-badge">🎨 Convert</div>
    <h1>RGB ↔ Hex Converter</h1>
    <p class="tool-desc">Convert between RGB and HEX color formats with live preview.</p>
  </div>

  <div class="card">
    <div class="preview-bar" id="previewBar" style="background:rgb(52,152,219)">
      <span class="preview-label" id="previewLabel" style="color:#fff">#3498DB</span>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="setMode('rgb',this)">RGB → HEX</button>
      <button class="tab" onclick="setMode('hex',this)">HEX → RGB</button>
    </div>

    <!-- RGB mode -->
    <div id="rgbMode">
      <div class="section">
        <label>Adjust Channels</label>
        <div class="rgb-sliders">
          <div class="slider-row">
            <span class="slider-channel r">R</span>
            <input type="range" class="r-slider" id="rSlider" min="0" max="255" value="52" oninput="onRgbSlider()">
            <input type="number" class="slider-num" id="rNum" min="0" max="255" value="52" oninput="onRgbNum()">
          </div>
          <div class="slider-row">
            <span class="slider-channel g">G</span>
            <input type="range" class="g-slider" id="gSlider" min="0" max="255" value="152" oninput="onRgbSlider()">
            <input type="number" class="slider-num" id="gNum" min="0" max="255" value="152" oninput="onRgbNum()">
          </div>
          <div class="slider-row">
            <span class="slider-channel b">B</span>
            <input type="range" class="b-slider" id="bSlider" min="0" max="255" value="219" oninput="onRgbSlider()">
            <input type="number" class="slider-num" id="bNum" min="0" max="255" value="219" oninput="onRgbNum()">
          </div>
        </div>
      </div>
    </div>

    <!-- HEX mode -->
    <div id="hexMode" style="display:none">
      <div class="section">
        <label>Enter HEX Code</label>
        <div class="hex-row">
          <input type="text" class="hex-field" id="hexField" value="#3498DB" maxlength="7" placeholder="#000000" oninput="onHexInput()">
          <input type="color" id="colorPicker" value="#3498db" oninput="onColorPicker()" style="width:48px;height:48px;border-radius:8px;border:1.5px solid var(--border);padding:3px;background:var(--surface);cursor:pointer;flex-shrink:0;">
        </div>
      </div>
    </div>

    <div class="divider"></div>

    <div class="section">
      <label>Output Formats</label>
      <div class="format-grid">
        <div class="format-item">
          <div><div class="format-lbl">HEX</div><div class="format-val" id="outHex">#3498DB</div></div>
          <button class="btn-copy" onclick="copyOut('outHex',this)">Copy</button>
        </div>
        <div class="format-item">
          <div><div class="format-lbl">RGB</div><div class="format-val" id="outRgb">rgb(52, 152, 219)</div></div>
          <button class="btn-copy" onclick="copyOut('outRgb',this)">Copy</button>
        </div>
        <div class="format-item">
          <div><div class="format-lbl">HSL</div><div class="format-val" id="outHsl">hsl(204, 70%, 53%)</div></div>
          <button class="btn-copy" onclick="copyOut('outHsl',this)">Copy</button>
        </div>
        <div class="format-item">
          <div><div class="format-lbl">CSS Var</div><div class="format-val" id="outVar">--color: #3498DB</div></div>
          <button class="btn-copy" onclick="copyOut('outVar',this)">Copy</button>
        </div>
      </div>
    </div>
  </div>
</main>

<script>
  let activeMode = 'rgb';

  function setMode(m, btn) {
    activeMode = m;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('rgbMode').style.display = m === 'rgb' ? 'block' : 'none';
    document.getElementById('hexMode').style.display = m === 'hex' ? 'block' : 'none';
  }

  function toHex(c) { return c.toString(16).padStart(2, '0').toUpperCase(); }

  function hexBrightness(r, g, b) { return 0.299*r + 0.587*g + 0.114*b; }

  function hexToHsl(r, g, b) {
    r /= 255; g /= 255; b /= 255;
    const max = Math.max(r,g,b), min = Math.min(r,g,b);
    let h, s, l = (max+min)/2;
    if (max === min) { h = s = 0; }
    else {
      const d = max - min;
      s = l > 0.5 ? d/(2-max-min) : d/(max+min);
      switch(max) {
        case r: h = ((g-b)/d + (g<b?6:0))/6; break;
        case g: h = ((b-r)/d + 2)/6; break;
        case b: h = ((r-g)/d + 4)/6; break;
      }
    }
    return `hsl(${Math.round(h*360)}, ${Math.round(s*100)}%, ${Math.round(l*100)}%)`;
  }

  function updateAll(r, g, b) {
    const hex = `#${toHex(r)}${toHex(g)}${toHex(b)}`;
    const rgb = `rgb(${r}, ${g}, ${b})`;
    document.getElementById('outHex').textContent = hex;
    document.getElementById('outRgb').textContent = rgb;
    document.getElementById('outHsl').textContent = hexToHsl(r, g, b);
    document.getElementById('outVar').textContent = `--color: ${hex}`;
    document.getElementById('previewBar').style.background = hex;
    document.getElementById('previewLabel').textContent = hex;
    document.getElementById('previewLabel').style.color = hexBrightness(r,g,b) > 140 ? '#1a1510' : '#fff';
    document.getElementById('hexField').value = hex;
    document.getElementById('colorPicker').value = hex.toLowerCase();
  }

  function onRgbSlider() {
    const r = +document.getElementById('rSlider').value;
    const g = +document.getElementById('gSlider').value;
    const b = +document.getElementById('bSlider').value;
    document.getElementById('rNum').value = r;
    document.getElementById('gNum').value = g;
    document.getElementById('bNum').value = b;
    updateAll(r, g, b);
  }

  function onRgbNum() {
    const r = Math.min(255, Math.max(0, +document.getElementById('rNum').value || 0));
    const g = Math.min(255, Math.max(0, +document.getElementById('gNum').value || 0));
    const b = Math.min(255, Math.max(0, +document.getElementById('bNum').value || 0));
    document.getElementById('rSlider').value = r;
    document.getElementById('gSlider').value = g;
    document.getElementById('bSlider').value = b;
    updateAll(r, g, b);
  }

  function onHexInput() {
    const val = document.getElementById('hexField').value;
    if (/^#[0-9A-Fa-f]{6}$/.test(val)) {
      const r = parseInt(val.slice(1,3),16), g = parseInt(val.slice(3,5),16), b = parseInt(val.slice(5,7),16);
      document.getElementById('rSlider').value = r; document.getElementById('rNum').value = r;
      document.getElementById('gSlider').value = g; document.getElementById('gNum').value = g;
      document.getElementById('bSlider').value = b; document.getElementById('bNum').value = b;
      updateAll(r, g, b);
    }
  }

  function onColorPicker() {
    const val = document.getElementById('colorPicker').value;
    document.getElementById('hexField').value = val.toUpperCase();
    onHexInput();
  }

  function copyOut(id, btn) {
    navigator.clipboard.writeText(document.getElementById(id).textContent);
    btn.textContent = 'Copied!'; btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
  }

  updateAll(52, 152, 219);
</script>
</body>
</html>
